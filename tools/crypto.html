> 🔒 双向加解密 </button></div><div class="tool-panel" data-v-b7cbc1a1><h2 data-v-b7cbc1a1>📄 文本哈希</h2><p class="description" data-v-b7cbc1a1>将文本转换为固定长度的哈希值（单向，不可逆）</p><div class="form-group" data-v-b7cbc1a1><label data-v-b7cbc1a1>算法选择</label><select class="select-input" data-v-b7cbc1a1><!--[--><option value="MD5" data-v-b7cbc1a1>MD5 (不安全，仅兼容)</option><option value="SHA-1" data-v-b7cbc1a1>SHA-1 (不安全，仅兼容)</option><option value="SHA-256" data-v-b7cbc1a1 selected>SHA-256 (推荐)</option><option value="SHA-384" data-v-b7cbc1a1>SHA-384</option><option value="SHA-512" data-v-b7cbc1a1>SHA-512</option><!--]--></select></div><div class="form-group" data-v-b7cbc1a1><label data-v-b7cbc1a1>输入文本</label><textarea placeholder="请输入要哈希的文本..." class="text-input" rows="3" data-v-b7cbc1a1></textarea></div><button class="action-btn" data-v-b7cbc1a1>计算哈希值</button><!----><!----><div class="info-card" data-v-b7cbc1a1><h4 data-v-b7cbc1a1>💡 说明</h4><ul data-v-b7cbc1a1><li data-v-b7cbc1a1><strong data-v-b7cbc1a1>SHA-256/SHA-384/SHA-512:</strong> 目前最安全的哈希算法，推荐使用</li><li data-v-b7cbc1a1><strong data-v-b7cbc1a1>SHA-1:</strong> 已不安全，仅用于兼容旧系统</li><li data-v-b7cbc1a1><strong data-v-b7cbc1a1>MD5:</strong> 不安全，不建议用于安全场景</li><li data-v-b7cbc1a1>哈希是单向函数，无法从哈希值还原原始文本</li></ul></div></div><!----><!----></div></div><!--]--></div><!--[--><!--]--></div></div><!--]--><!--]--></div></div><!--]--><button type="button" class="vp-back-to-top" aria-label="back to top" data-v-ea6c3a80 style="display:none;" data-v-bcf8d9a6><span class="percent" data-allow-mismatch data-v-bcf8d9a6>0%</span><span class="show icon vpi-back-to-top" data-v-bcf8d9a6></span><svg aria-hidden="true" data-v-bcf8d9a6><circle cx="50%" cy="50%" data-allow-mismatch style="stroke-dasharray:calc(0% - 12.566370614359172px) calc(314.1592653589793% - 12.566370614359172px);" data-v-bcf8d9a6></circle></svg></button><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewbox="0 0 24 24" aria-label="sign down" class="vp-sign-down" aria-hidden="true" data
